apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
  namespace: assignment3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-api
  template:
    metadata:
      labels:
        app: flask-api
    spec:
      containers:
        - name: flask-api
          image: YOUR_DOCKERHUB_USERNAME/flask-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_USER
              value: flaskuser
            - name: DB_PASSWORD
              value: flaskpass
            - name: DB_NAME
              value: flaskdb
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
